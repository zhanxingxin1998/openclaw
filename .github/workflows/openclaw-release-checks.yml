  summary:
    name: Verify release checks
    needs:
      - resolve_target
      - prepare_release_package
      - install_smoke_release_checks
      - cross_os_release_checks
      - live_repo_e2e_release_checks
      - docker_e2e_release_checks
      - package_acceptance_release_checks
      - qa_lab_parity_lane_release_checks
      - maturity_scorecard_release_checks
      - qa_lab_parity_report_release_checks
      - qa_lab_runtime_parity_release_checks
      - runtime_tool_coverage_release_checks
      - qa_live_matrix_release_checks
      - qa_live_telegram_release_checks
      - qa_live_discord_release_checks
      - qa_live_whatsapp_release_checks
      - qa_live_slack_release_checks
    if: always()
    runs-on: ubuntu-24.04
    permissions:
      actions: read
    timeout-minutes: 5
    steps:
      - name: Download advisory status artifacts
        if: always()
        continue-on-error: true
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          pattern: release-check-status-*-${{ needs.resolve_target.outputs.revision }}-${{ github.run_id }}-${{ github.run_attempt }}
          path: .artifacts/release-check-status
          merge-multiple: true

      - name: Verify release check results
        shell: bash
        env:
          RESOLVE_TARGET_RESULT: ${{ needs.resolve_target.result }}
          PREPARE_RELEASE_PACKAGE_RESULT: ${{ needs.prepare_release_package.result }}
          INSTALL_SMOKE_RELEASE_CHECKS_RESULT: ${{ needs.install_smoke_release_checks.result }}
          CROSS_OS_RELEASE_CHECKS_RESULT: ${{ needs.cross_os_release_checks.result }}
          LIVE_REPO_E2E_RELEASE_CHECKS_RESULT: ${{ needs.live_repo_e2e_release_checks.result }}
          DOCKER_E2E_RELEASE_CHECKS_RESULT: ${{ needs.docker_e2e_release_checks.result }}
          PACKAGE_ACCEPTANCE_RELEASE_CHECKS_RESULT: ${{ needs.package_acceptance_release_checks.result }}
          QA_LAB_PARITY_LANE_RELEASE_CHECKS_RESULT: ${{ needs.qa_lab_parity_lane_release_checks.result }}
          MATURITY_SCORECARD_RELEASE_CHECKS_RESULT: ${{ needs.maturity_scorecard_release_checks.result }}
          QA_LAB_PARITY_REPORT_RELEASE_CHECKS_RESULT: ${{ needs.qa_lab_parity_report_release_checks.result }}
          QA_LAB_RUNTIME_PARITY_RELEASE_CHECKS_RESULT: ${{ needs.qa_lab_runtime_parity_release_checks.result }}
          RUNTIME_TOOL_COVERAGE_RELEASE_CHECKS_RESULT: ${{ needs.runtime_tool_coverage_release_checks.result }}
          QA_LIVE_MATRIX_RELEASE_CHECKS_RESULT: ${{ needs.qa_live_matrix_release_checks.result }}
          QA_LIVE_TELEGRAM_RELEASE_CHECKS_RESULT: ${{ needs.qa_live_telegram_release_checks.result }}
          QA_LIVE_TELEGRAM_SELECTED: ${{ contains(fromJSON('["all","qa","qa-live"]'), needs.resolve_target.outputs.rerun_group) && needs.resolve_target.outputs.qa_live_telegram_enabled == 'true' }}
          QA_LIVE_DISCORD_RELEASE_CHECKS_RESULT: ${{ needs.qa_live_discord_release_checks.result }}
          QA_LIVE_WHATSAPP_RELEASE_CHECKS_RESULT: ${{ needs.qa_live_whatsapp_release_checks.result }}
          QA_LIVE_SLACK_RELEASE_CHECKS_RESULT: ${{ needs.qa_live_slack_release_checks.result }}
          RELEASE_CHECK_RUN_ID: ${{ github.run_id }}
          RELEASE_CHECK_RUN_ATTEMPT: ${{ github.run_attempt }}
          RELEASE_CHECK_TARGET_SHA: ${{ needs.resolve_target.outputs.revision }}
          WORKFLOW_REF: ${{ github.ref }}
        run: |
          set -euo pipefail
          failed=0
          release_check_items=(
            "resolve_target=${RESOLVE_TARGET_RESULT}"
            "prepare_release_package=${PREPARE_RELEASE_PACKAGE_RESULT}"
            "install_smoke_release_checks=${INSTALL_SMOKE_RELEASE_CHECKS_RESULT}"
            "cross_os_release_checks=${CROSS_OS_RELEASE_CHECKS_RESULT}"
            "live_repo_e2e_release_checks=${LIVE_REPO_E2E_RELEASE_CHECKS_RESULT}"
            "docker_e2e_release_checks=${DOCKER_E2E_RELEASE_CHECKS_RESULT}"
            "package_acceptance_release_checks=${PACKAGE_ACCEPTANCE_RELEASE_CHECKS_RESULT}"
            "qa_lab_parity_lane_release_checks=${QA_LAB_PARITY_LANE_RELEASE_CHECKS_RESULT}"
            "maturity_scorecard_release_checks=${MATURITY_SCORECARD_RELEASE_CHECKS_RESULT}"
            "qa_lab_parity_report_release_checks=${QA_LAB_PARITY_REPORT_RELEASE_CHECKS_RESULT}"
            "qa_lab_runtime_parity_release_checks=${QA_LAB_RUNTIME_PARITY_RELEASE_CHECKS_RESULT}"
            "runtime_tool_coverage_release_checks=${RUNTIME_TOOL_COVERAGE_RELEASE_CHECKS_RESULT}"
            "qa_live_matrix_release_checks=${QA_LIVE_MATRIX_RELEASE_CHECKS_RESULT}"
            "qa_live_telegram_release_checks=${QA_LIVE_TELEGRAM_RELEASE_CHECKS_RESULT}"
            "qa_live_discord_release_checks=${QA_LIVE_DISCORD_RELEASE_CHECKS_RESULT}"
            "qa_live_whatsapp_release_checks=${QA_LIVE_WHATSAPP_RELEASE_CHECKS_RESULT}"
            "qa_live_slack_release_checks=${QA_LIVE_SLACK_RELEASE_CHECKS_RESULT}"
          )
          advisory_status_items=(
            "qa_lab_parity_lane_release_checks=${QA_LAB_PARITY_LANE_RELEASE_CHECKS_RESULT}"
            "qa_lab_parity_report_release_checks=${QA_LAB_PARITY_REPORT_RELEASE_CHECKS_RESULT}"
            "qa_lab_runtime_parity_release_checks=${QA_LAB_RUNTIME_PARITY_RELEASE_CHECKS_RESULT}"
            "qa_live_matrix_release_checks=${QA_LIVE_MATRIX_RELEASE_CHECKS_RESULT}"
            "qa_live_discord_release_checks=${QA_LIVE_DISCORD_RELEASE_CHECKS_RESULT}"
            "qa_live_whatsapp_release_checks=${QA_LIVE_WHATSAPP_RELEASE_CHECKS_RESULT}"
            "qa_live_slack_release_checks=${QA_LIVE_SLACK_RELEASE_CHECKS_RESULT}"
          )
          tideclaw_alpha=false
          if [[ "${WORKFLOW_REF}" =~ ^refs/heads/tideclaw/alpha/[0-9]{4}-[0-9]{2}-[0-9]{2}-[0-9]{4}Z$ ]]; then
            tideclaw_alpha=true
          fi
          status_field() {
            local file="$1"
            local key="$2"
            awk -v key="$key" '
              index($0, key "=") == 1 {
                count += 1
                value = substr($0, length(key) + 2)
              }
              END {
                if (count != 1) {
                  exit 1
                }
                print value
              }
            ' "$file"
          }
          validate_status_file() {
            local file="$1"
            local expected_job="$2"
            local expected_variant="$3"
            local actual_run_id actual_run_attempt actual_target_sha actual_job actual_variant
            if [[ ! -f "$file" ]]; then
              echo "::error::Missing advisory status file: ${file}" >&2
              return 1
            fi
            actual_run_id="$(status_field "$file" run_id)" || {
              echo "::error::Advisory status file ${file} has invalid run_id metadata." >&2
              return 1
            }
            actual_run_attempt="$(status_field "$file" run_attempt)" || {
              echo "::error::Advisory status file ${file} has invalid run_attempt metadata." >&2
              return 1
            }
            actual_target_sha="$(status_field "$file" target_sha)" || {
              echo "::error::Advisory status file ${file} has invalid target_sha metadata." >&2
              return 1
            }
            actual_job="$(status_field "$file" job)" || {
              echo "::error::Advisory status file ${file} has invalid job metadata." >&2
              return 1
            }
            actual_variant="$(status_field "$file" variant)" || {
              echo "::error::Advisory status file ${file} has invalid variant metadata." >&2
              return 1
            }
            if [[ "$actual_run_id" != "$RELEASE_CHECK_RUN_ID" ||
                  "$actual_run_attempt" != "$RELEASE_CHECK_RUN_ATTEMPT" ||
                  "$actual_target_sha" != "$RELEASE_CHECK_TARGET_SHA" ||
                  "$actual_job" != "$expected_job" ||
                  "$actual_variant" != "$expected_variant" ]]; then
              echo "::error::Advisory status file ${file} does not match the current run, attempt, target, job, and variant." >&2
              return 1
            fi
          }
          expected_status_artifact_count() {
            local name="$1"
            local fallback="$2"
            if [[ "$fallback" == "skipped" ]]; then
              printf '0\n'
              return
            fi
            if [[ "$name" == "qa_lab_parity_lane_release_checks" ]]; then
              printf '2\n'
            else
              printf '1\n'
            fi
          }
          expected_status_count=0
          for item in "${advisory_status_items[@]}"; do
            name="${item%%=*}"
            raw_result="${item#*=}"
            expected_count="$(expected_status_artifact_count "$name" "$raw_result")"
            expected_status_count=$((expected_status_count + expected_count))
          done
          status_dir=".artifacts/release-check-status"
          actual_status_count=0
          if [[ -d "$status_dir" ]]; then
            actual_status_count="$(find "$status_dir" -maxdepth 1 -type f -name '*.env' | wc -l | tr -d '[:space:]')"
          fi
          if [[ "$actual_status_count" != "$expected_status_count" ]]; then
            status_count_message="Expected ${expected_status_count} advisory status artifacts for run ${RELEASE_CHECK_RUN_ID} attempt ${RELEASE_CHECK_RUN_ATTEMPT}, found ${actual_status_count}."
            if [[ "$tideclaw_alpha" == "true" ]]; then
              echo "::warning::${status_count_message} Tideclaw alpha treats non-package-safety release-check lanes as advisory."
            else
              echo "::error::${status_count_message}"
              failed=1
            fi
          fi
          release_check_result() {
            local name="$1"
            local fallback="$2"
            local saw=0
            local saw_failure=0
            local saw_cancelled=0
            local saw_skipped=0
            local variants=()
            if [[ "$fallback" != "skipped" ]]; then
              if [[ "$name" == "qa_lab_parity_lane_release_checks" ]]; then
                variants=(candidate baseline)
              else
                variants=("")
              fi
            fi
            for variant in "${variants[@]}"; do
              suffix=""
              if [[ -n "$variant" ]]; then
                suffix="-${variant}"
              fi
              file="${status_dir}/${name}${suffix}-${RELEASE_CHECK_RUN_ID}-${RELEASE_CHECK_RUN_ATTEMPT}.env"
              if ! validate_status_file "$file" "$name" "$variant"; then
                saw_failure=1
                continue
              fi
              saw=1
              status="$(status_field "$file" status)" || status=""
              case "$status" in
                success) ;;
                skipped) saw_skipped=1 ;;
                cancelled) saw_cancelled=1 ;;
                failure|"") saw_failure=1 ;;
                *) saw_failure=1 ;;
              esac
            done
            if [[ "$fallback" == "skipped" ]]; then
              printf 'skipped\n'
              return
            fi
            if [[ "$saw_failure" == "1" ]]; then
              printf 'failure\n'
            elif [[ "$saw_cancelled" == "1" ]]; then
              printf 'cancelled\n'
            elif [[ "$saw_skipped" == "1" ]]; then
              printf 'skipped\n'
            elif [[ "$fallback" != "success" && "$fallback" != "skipped" ]]; then
              printf '%s\n' "$fallback"
            elif [[ "$saw" == "1" ]]; then
              printf 'success\n'
            elif [[ "$fallback" == "success" ]]; then
              printf 'failure\n'
            else
              printf '%s\n' "$fallback"
            fi
          }
          advisory_status_override_allowed() {
            case "$1" in
              qa_lab_parity_lane_release_checks|qa_lab_parity_report_release_checks|qa_lab_runtime_parity_release_checks|qa_live_matrix_release_checks|qa_live_discord_release_checks|qa_live_whatsapp_release_checks|qa_live_slack_release_checks)
                return 0
                ;;
              *)
                return 1
                ;;
            esac
          }
          for item in "${release_check_items[@]}"; do
            name="${item%%=*}"
            raw_result="${item#*=}"
            if advisory_status_override_allowed "$name"; then
              result="$(release_check_result "$name" "$raw_result")"
            else
              result="$raw_result"
            fi
            require_success=false
            if [[ "$name" == "qa_live_telegram_release_checks" &&
                  "$QA_LIVE_TELEGRAM_SELECTED" == "true" ]]; then
              require_success=true
            fi
            if [[ "$result" != "success" &&
                  ( "$result" != "skipped" || "$require_success" == "true" ) ]]; then
              if [[ "$tideclaw_alpha" == "true" ]]; then
                case "$name" in
                  resolve_target|prepare_release_package|install_smoke_release_checks|package_acceptance_release_checks) ;;
                  *)
                    echo "::warning::${name} ended with ${result}; Tideclaw alpha treats non-package-safety release-check lanes as advisory."
                    continue
                    ;;
                esac
              fi
              echo "::error::${name} ended with ${result}"
              failed=1
            fi
          done
          exit "$failed"
