        if: always()
        shell: bash
        env:
          RELEASE_CHECK_JOB: qa_live_discord_release_checks
          RELEASE_CHECK_TARGET_SHA: ${{ needs.resolve_target.outputs.revision }}
          JOB_STATUS: ${{ job.status }}
          RELEASE_CHECK_STEP_OUTCOMES: ${{ steps.run_lane.outcome }} ${{ steps.upload_discord_qa_artifacts.outcome }}
        run: *record_release_check_advisory_status

      - name: Upload advisory status
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: release-check-status-qa-live-discord-${{ needs.resolve_target.outputs.revision }}-${{ github.run_id }}-${{ github.run_attempt }}
          path: .artifacts/release-check-status/qa_live_discord_release_checks-${{ github.run_id }}-${{ github.run_attempt }}.env
          retention-days: 14
          if-no-files-found: error

