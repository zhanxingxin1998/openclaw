  qa_lab_parity_lane_release_checks:
    name: Run QA Lab parity lane (${{ matrix.lane }})
    needs: [resolve_target]
    if: contains(fromJSON('["all","qa","qa-parity"]'), needs.resolve_target.outputs.rerun_group)
    continue-on-error: true
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - lane: candidate
            output_dir: openai-candidate
          - lane: baseline
            output_dir: anthropic-baseline
    env:
      QA_PARITY_CONCURRENCY: "1"
      OPENCLAW_QA_TRANSPORT_READY_TIMEOUT_MS: "180000"
      OPENAI_API_KEY: ""
      ANTHROPIC_API_KEY: ""
      OPENCLAW_LIVE_OPENAI_KEY: ""
      OPENCLAW_LIVE_ANTHROPIC_KEY: ""
      OPENCLAW_LIVE_GEMINI_KEY: ""
      OPENCLAW_LIVE_SETUP_TOKEN_VALUE: ""
      OPENCLAW_BUILD_PRIVATE_QA: "1"
      OPENCLAW_ENABLE_PRIVATE_QA_CLI: "1"
    steps:
      - name: Checkout selected ref
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          persist-credentials: false
          ref: ${{ needs.resolve_target.outputs.revision }}
          fetch-depth: 1

      - name: Setup Node environment
        uses: ./.github/actions/setup-node-env
        with:
          node-version: ${{ env.NODE_VERSION }}
          install-bun: "true"

      - name: Build private QA runtime
        env:
          NODE_OPTIONS: --max-old-space-size=8192
        run: node scripts/build-all.mjs qaRuntime

      - name: Run parity lane
        id: run_lane
        env:
          QA_PARITY_LANE: ${{ matrix.lane }}
          QA_PARITY_OUTPUT_DIR: ${{ matrix.output_dir }}
        run: |
          set -euo pipefail

          case "${QA_PARITY_LANE}" in
            candidate)
              model="${OPENCLAW_CI_OPENAI_MODEL}"
              alt_model="openai/gpt-5.5-alt"
              ;;
            baseline)
              model="anthropic/claude-opus-4-8"
              alt_model="anthropic/claude-sonnet-4-6"
              ;;
            *)
              echo "Unknown QA parity lane: ${QA_PARITY_LANE}" >&2
              exit 1
              ;;
          esac

          pnpm openclaw qa suite \
            --provider-mode mock-openai \
            --parity-pack agentic \
            --concurrency "${QA_PARITY_CONCURRENCY}" \
            --model "${model}" \
            --alt-model "${alt_model}" \
            --output-dir ".artifacts/qa-e2e/${QA_PARITY_OUTPUT_DIR}"

      - name: Upload parity lane artifacts
        id: upload_parity_lane_artifacts
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: release-qa-parity-${{ matrix.lane }}-${{ needs.resolve_target.outputs.revision }}
          path: .artifacts/qa-e2e/
          retention-days: 14
          if-no-files-found: error

      - name: Record advisory status
        if: always()
        shell: bash
        env:
          RELEASE_CHECK_JOB: qa_lab_parity_lane_release_checks
          RELEASE_CHECK_VARIANT: ${{ matrix.lane }}
          RELEASE_CHECK_TARGET_SHA: ${{ needs.resolve_target.outputs.revision }}
          JOB_STATUS: ${{ job.status }}
          RELEASE_CHECK_STEP_OUTCOMES: ${{ steps.run_lane.outcome }} ${{ steps.upload_parity_lane_artifacts.outcome }}
        run: &record_release_check_advisory_status |
          set -euo pipefail
          status="success"
          mark_status() {
            case "$1" in
              failure) status="failure" ;;
              cancelled)
                if [[ "$status" != "failure" ]]; then
                  status="cancelled"
                fi
                ;;
              success|skipped|"") ;;
              *) status="failure" ;;
            esac
          }
          mark_status "${JOB_STATUS:-}"
          for outcome in ${RELEASE_CHECK_STEP_OUTCOMES:-}; do
            mark_status "$outcome"
          done
          mkdir -p .artifacts/release-check-status
          status_name="$RELEASE_CHECK_JOB"
          if [[ -n "${RELEASE_CHECK_VARIANT:-}" ]]; then
            status_name="${status_name}-${RELEASE_CHECK_VARIANT}"
          fi
          status_path=".artifacts/release-check-status/${status_name}-${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}.env"
          {
            printf 'run_id=%s\n' "${GITHUB_RUN_ID:?}"
            printf 'run_attempt=%s\n' "${GITHUB_RUN_ATTEMPT:?}"
            printf 'target_sha=%s\n' "${RELEASE_CHECK_TARGET_SHA:?}"
            printf 'job=%s\n' "$RELEASE_CHECK_JOB"
            printf 'variant=%s\n' "${RELEASE_CHECK_VARIANT:-}"
            printf 'status=%s\n' "$status"
            printf 'job_status=%s\n' "${JOB_STATUS:-}"
            printf 'step_outcomes=%s\n' "${RELEASE_CHECK_STEP_OUTCOMES:-}"
          } > "$status_path"

      - name: Upload advisory status
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: release-check-status-qa-parity-${{ matrix.lane }}-${{ needs.resolve_target.outputs.revision }}-${{ github.run_id }}-${{ github.run_attempt }}
          path: .artifacts/release-check-status/qa_lab_parity_lane_release_checks-${{ matrix.lane }}-${{ github.run_id }}-${{ github.run_attempt }}.env
          retention-days: 14
          if-no-files-found: error

  qa_lab_parity_report_release_checks:
    name: Run QA Lab parity report
    needs: [resolve_target, qa_lab_parity_lane_release_checks]
    if: contains(fromJSON('["all","qa","qa-parity"]'), needs.resolve_target.outputs.rerun_group)
    continue-on-error: true
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    permissions:
      contents: read
      actions: read
    env:
      OPENCLAW_BUILD_PRIVATE_QA: "1"
      OPENCLAW_ENABLE_PRIVATE_QA_CLI: "1"
    steps:
      - name: Checkout selected ref
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          persist-credentials: false
          ref: ${{ needs.resolve_target.outputs.revision }}
          fetch-depth: 1

      - name: Setup Node environment
        uses: ./.github/actions/setup-node-env
        with:
          node-version: ${{ env.NODE_VERSION }}
          install-bun: "true"

      - name: Download parity lane artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          pattern: release-qa-parity-*-${{ needs.resolve_target.outputs.revision }}
          path: .artifacts/qa-e2e/
          merge-multiple: true

      - name: Build private QA runtime
        env:
          NODE_OPTIONS: --max-old-space-size=8192
        run: node scripts/build-all.mjs qaRuntime

      - name: Generate parity report
        id: generate_report
        run: |
          pnpm openclaw qa parity-report \
            --repo-root . \
            --candidate-summary .artifacts/qa-e2e/openai-candidate/qa-suite-summary.json \
            --baseline-summary .artifacts/qa-e2e/anthropic-baseline/qa-suite-summary.json \
            --candidate-label "${OPENCLAW_CI_OPENAI_MODEL}" \
            --baseline-label anthropic/claude-opus-4-8 \
            --output-dir .artifacts/qa-e2e/parity

      - name: Upload parity artifacts
        id: upload_parity_artifacts
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: release-qa-parity-${{ needs.resolve_target.outputs.revision }}
          path: .artifacts/qa-e2e/
          retention-days: 14
          if-no-files-found: error

      - name: Record advisory status
        if: always()
        shell: bash
        env:
          RELEASE_CHECK_JOB: qa_lab_parity_report_release_checks
          RELEASE_CHECK_TARGET_SHA: ${{ needs.resolve_target.outputs.revision }}
          JOB_STATUS: ${{ job.status }}
          RELEASE_CHECK_STEP_OUTCOMES: ${{ steps.generate_report.outcome }} ${{ steps.upload_parity_artifacts.outcome }}
        run: *record_release_check_advisory_status

      - name: Upload advisory status
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: release-check-status-qa-parity-report-${{ needs.resolve_target.outputs.revision }}-${{ github.run_id }}-${{ github.run_attempt }}
          path: .artifacts/release-check-status/qa_lab_parity_report_release_checks-${{ github.run_id }}-${{ github.run_attempt }}.env
          retention-days: 14
          if-no-files-found: error

  qa_lab_runtime_parity_release_checks:
    name: Run QA Lab runtime parity lane
    needs: [resolve_target]
    if: contains(fromJSON('["all","qa","qa-parity"]'), needs.resolve_target.outputs.rerun_group)
    continue-on-error: true
    runs-on: blacksmith-8vcpu-ubuntu-2404
    timeout-minutes: 45
    permissions:
      contents: read
    env:
      QA_PARITY_CONCURRENCY: "1"
      OPENCLAW_QA_TRANSPORT_READY_TIMEOUT_MS: "180000"
      OPENAI_API_KEY: ""
      ANTHROPIC_API_KEY: ""
      OPENCLAW_LIVE_OPENAI_KEY: ""
      OPENCLAW_LIVE_ANTHROPIC_KEY: ""
      OPENCLAW_LIVE_GEMINI_KEY: ""
      OPENCLAW_LIVE_SETUP_TOKEN_VALUE: ""
      OPENCLAW_BUILD_PRIVATE_QA: "1"
      OPENCLAW_ENABLE_PRIVATE_QA_CLI: "1"
    steps:
      - name: Checkout selected ref
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          persist-credentials: false
          ref: ${{ needs.resolve_target.outputs.revision }}
          fetch-depth: 1

      - name: Setup Node environment
        uses: ./.github/actions/setup-node-env
        with:
          node-version: ${{ env.NODE_VERSION }}
          install-bun: "true"

      - name: Build private QA runtime
        env:
          NODE_OPTIONS: --max-old-space-size=8192
        run: node scripts/build-all.mjs qaRuntime

      - name: Run runtime parity lane
        id: runtime_parity_lane
        run: |
          set -euo pipefail
          pnpm openclaw qa suite \
            --provider-mode mock-openai \
            --parity-pack agentic \
            --concurrency "${QA_PARITY_CONCURRENCY}" \
            --model "${OPENCLAW_CI_OPENAI_MODEL}" \
            --alt-model "openai/gpt-5.5-alt" \
            --runtime-pair openclaw,codex \
            --output-dir ".artifacts/qa-e2e/runtime-parity"

      - name: Run standard runtime parity tier
        id: runtime_parity_standard_lane
        if: ${{ always() && steps.runtime_parity_lane.outcome != 'skipped' && steps.runtime_parity_lane.outcome != 'cancelled' }}
        run: |
          set -euo pipefail
          pnpm openclaw qa suite \
            --provider-mode mock-openai \
            --runtime-parity-tier standard \
            --concurrency "${QA_PARITY_CONCURRENCY}" \
            --model "${OPENCLAW_CI_OPENAI_MODEL}" \
            --alt-model "openai/gpt-5.5-alt" \
            --runtime-pair openclaw,codex \
            --output-dir ".artifacts/qa-e2e/runtime-parity-standard"

      - name: Run soak runtime parity tier
        id: runtime_parity_soak_lane
        if: ${{ always() && needs.resolve_target.outputs.run_release_soak == 'true' && steps.runtime_parity_lane.outcome != 'skipped' && steps.runtime_parity_lane.outcome != 'cancelled' }}
        run: |
          set -euo pipefail
          pnpm openclaw qa suite \
            --provider-mode mock-openai \
            --runtime-parity-tier soak \
            --concurrency "${QA_PARITY_CONCURRENCY}" \
            --model "${OPENCLAW_CI_OPENAI_MODEL}" \
            --alt-model "openai/gpt-5.5-alt" \
            --runtime-pair openclaw,codex \
            --output-dir ".artifacts/qa-e2e/runtime-parity-soak"

      - name: Generate runtime parity report
        id: generate_runtime_parity_report
        if: always()
        run: |
          set -euo pipefail
          pnpm openclaw qa parity-report \
            --repo-root . \
            --runtime-axis \
            --summary .artifacts/qa-e2e/runtime-parity/qa-suite-summary.json \
            --output-dir .artifacts/qa-e2e/runtime-parity-report

      - name: Generate standard runtime parity report
        id: generate_runtime_parity_standard_report
        if: always()
        run: |
          set -euo pipefail
          pnpm openclaw qa parity-report \
            --repo-root . \
            --runtime-axis \
            --summary .artifacts/qa-e2e/runtime-parity-standard/qa-suite-summary.json \
            --output-dir .artifacts/qa-e2e/runtime-parity-standard-report

      - name: Generate soak runtime parity report
        id: generate_runtime_parity_soak_report
        if: ${{ always() && needs.resolve_target.outputs.run_release_soak == 'true' && steps.runtime_parity_soak_lane.outcome != 'skipped' && steps.runtime_parity_soak_lane.outcome != 'cancelled' }}
        run: |
          set -euo pipefail
          summary=".artifacts/qa-e2e/runtime-parity-soak/qa-suite-summary.json"
          if [[ ! -f "$summary" ]]; then
            echo "No soak runtime parity summary was produced."
            exit 0
          fi
          pnpm openclaw qa parity-report \
            --repo-root . \
            --runtime-axis \
            --summary "$summary" \
            --output-dir .artifacts/qa-e2e/runtime-parity-soak-report

      - name: Upload runtime parity artifacts
        id: upload_runtime_parity_artifacts
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: release-qa-runtime-parity-${{ needs.resolve_target.outputs.revision }}
          path: .artifacts/qa-e2e/
          retention-days: 14
          if-no-files-found: error

      - name: Record advisory status
        if: always()
        shell: bash
        env:
          RELEASE_CHECK_JOB: qa_lab_runtime_parity_release_checks
          RELEASE_CHECK_TARGET_SHA: ${{ needs.resolve_target.outputs.revision }}
          JOB_STATUS: ${{ job.status }}
          RELEASE_CHECK_STEP_OUTCOMES: ${{ steps.runtime_parity_lane.outcome }} ${{ steps.runtime_parity_standard_lane.outcome }} ${{ steps.runtime_parity_soak_lane.outcome }} ${{ steps.generate_runtime_parity_report.outcome }} ${{ steps.generate_runtime_parity_standard_report.outcome }} ${{ steps.generate_runtime_parity_soak_report.outcome }} ${{ steps.upload_runtime_parity_artifacts.outcome }}
        run: *record_release_check_advisory_status

      - name: Upload advisory status
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: release-check-status-qa-runtime-parity-${{ needs.resolve_target.outputs.revision }}-${{ github.run_id }}-${{ github.run_attempt }}
          path: .artifacts/release-check-status/qa_lab_runtime_parity_release_checks-${{ github.run_id }}-${{ github.run_attempt }}.env
          retention-days: 14
          if-no-files-found: error

  runtime_tool_coverage_release_checks:
    name: Enforce QA Lab runtime tool coverage
    needs: [resolve_target, qa_lab_runtime_parity_release_checks]
    if: contains(fromJSON('["all","qa","qa-parity"]'), needs.resolve_target.outputs.rerun_group)
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    permissions:
      contents: read
      actions: read
    env:
      OPENCLAW_BUILD_PRIVATE_QA: "1"
      OPENCLAW_ENABLE_PRIVATE_QA_CLI: "1"
    steps:
      - name: Checkout selected ref
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          persist-credentials: false
          ref: ${{ needs.resolve_target.outputs.revision }}
          fetch-depth: 1

      - name: Setup Node environment
        uses: ./.github/actions/setup-node-env
        with:
          node-version: ${{ env.NODE_VERSION }}
          install-bun: "true"

      - name: Download runtime parity status
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: release-check-status-qa-runtime-parity-${{ needs.resolve_target.outputs.revision }}-${{ github.run_id }}-${{ github.run_attempt }}
          path: .artifacts/release-check-status/

      - name: Verify runtime parity producer status
        id: verify_runtime_parity_status
        shell: bash
        env:
          RELEASE_CHECK_TARGET_SHA: ${{ needs.resolve_target.outputs.revision }}
        run: |
          set -euo pipefail
          status_path=".artifacts/release-check-status/qa_lab_runtime_parity_release_checks-${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}.env"
          status_field() {
            local key="$1"
            awk -v key="$key" '
              index($0, key "=") == 1 {
                count += 1
                value = substr($0, length(key) + 2)
              }
              END {
                if (count != 1) {
                  exit 1
                }
                print value
              }
            ' "$status_path"
          }
          run_id="$(status_field run_id)"
          run_attempt="$(status_field run_attempt)"
          target_sha="$(status_field target_sha)"
          job_name="$(status_field job)"
          variant="$(status_field variant)"
          if [[ "$run_id" != "$GITHUB_RUN_ID" ||
                "$run_attempt" != "$GITHUB_RUN_ATTEMPT" ||
                "$target_sha" != "$RELEASE_CHECK_TARGET_SHA" ||
                "$job_name" != "qa_lab_runtime_parity_release_checks" ||
                -n "$variant" ]]; then
            echo "Runtime parity producer status does not match the current run, attempt, target, job, and variant." >&2
            exit 1
          fi
          status="$(sed -n 's/^status=//p' "$status_path" | tail -n 1)"
          if [[ "$status" != "success" ]]; then
            echo "Runtime parity producer status is ${status:-missing}; skipping coverage artifact consumer."
            echo "ready=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          echo "ready=true" >> "$GITHUB_OUTPUT"

      - name: Download runtime parity artifacts
        if: steps.verify_runtime_parity_status.outputs.ready == 'true'
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: release-qa-runtime-parity-${{ needs.resolve_target.outputs.revision }}
          path: .artifacts/qa-e2e/

      - name: Enforce standard runtime tool coverage
        if: steps.verify_runtime_parity_status.outputs.ready == 'true'
        run: |
          set -euo pipefail
          pnpm openclaw qa coverage \
            --repo-root . \
            --tools \
            --summary .artifacts/qa-e2e/runtime-parity-standard/qa-suite-summary.json \
            --output .artifacts/qa-e2e/runtime-parity-standard-report/qa-runtime-tool-coverage-report.md

      - name: Upload runtime tool coverage artifacts
        if: ${{ always() && steps.verify_runtime_parity_status.outputs.ready == 'true' }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: release-qa-runtime-tool-coverage-${{ needs.resolve_target.outputs.revision }}
          path: .artifacts/qa-e2e/runtime-parity-standard-report/
          retention-days: 14
          if-no-files-found: error

  qa_live_matrix_release_checks:
    name: Run QA Lab live Matrix lane
    needs: [resolve_target]
    if: contains(fromJSON('["all","qa","qa-live"]'), needs.resolve_target.outputs.rerun_group) && needs.resolve_target.outputs.qa_live_matrix_enabled == 'true'
    continue-on-error: true
    runs-on: blacksmith-16vcpu-ubuntu-2404
    timeout-minutes: 60
    permissions:
      contents: read
      pull-requests: read
    environment: qa-live-shared
    env:
      OPENCLAW_BUILD_PRIVATE_QA: "1"
      OPENCLAW_ENABLE_PRIVATE_QA_CLI: "1"
    steps:
      - name: Checkout selected ref
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          persist-credentials: false
          ref: ${{ needs.resolve_target.outputs.revision }}
          fetch-depth: 1

      - name: Setup Node environment
        uses: ./.github/actions/setup-node-env
        with:
          node-version: ${{ env.NODE_VERSION }}
          install-bun: "true"

      - name: Build private QA runtime
        env:
          NODE_OPTIONS: --max-old-space-size=8192
        run: node scripts/build-all.mjs qaRuntime

      - name: Run Matrix live lane
        id: run_lane
        shell: bash
        env:
          OPENCLAW_QA_REDACT_PUBLIC_METADATA: "1"
          OPENCLAW_QA_MATRIX_CANARY_TIMEOUT_MS: "90000"
          OPENCLAW_QA_MATRIX_NO_REPLY_WINDOW_MS: "3000"
        run: |
          set -euo pipefail

          output_dir=".artifacts/qa-e2e/matrix-live-release-${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}"
          echo "output_dir=${output_dir}" >> "$GITHUB_OUTPUT"

          matrix_args=(
            --repo-root . \
            --provider-mode mock-openai \
            --model mock-openai/gpt-5.5 \
            --alt-model mock-openai/gpt-5.5-alt \
            --profile fast \
            --fast
          )
          if pnpm openclaw qa matrix --help 2>/dev/null | grep -F -q -- "--fail-fast"; then
            matrix_args+=(--fail-fast)
          fi

          for attempt in 1 2; do
            attempt_output_dir="${output_dir}/attempt-${attempt}"
            if pnpm openclaw qa matrix --output-dir "${attempt_output_dir}" "${matrix_args[@]}"; then
              exit 0
            fi
            if [[ "${attempt}" == "2" ]]; then
              exit 1
            fi
            echo "Matrix live lane failed on attempt ${attempt}; retrying once..." >&2
            sleep 10
          done

      - name: Upload Matrix QA artifacts
        id: upload_matrix_qa_artifacts
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: release-qa-live-matrix-${{ needs.resolve_target.outputs.revision }}
          path: .artifacts/qa-e2e/
          retention-days: 14
          if-no-files-found: error

      - name: Record advisory status
        if: always()
        shell: bash
        env:
          RELEASE_CHECK_JOB: qa_live_matrix_release_checks
          RELEASE_CHECK_TARGET_SHA: ${{ needs.resolve_target.outputs.revision }}
          JOB_STATUS: ${{ job.status }}
          RELEASE_CHECK_STEP_OUTCOMES: ${{ steps.run_lane.outcome }} ${{ steps.upload_matrix_qa_artifacts.outcome }}
        run: *record_release_check_advisory_status

      - name: Upload advisory status
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: release-check-status-qa-live-matrix-${{ needs.resolve_target.outputs.revision }}-${{ github.run_id }}-${{ github.run_attempt }}
          path: .artifacts/release-check-status/qa_live_matrix_release_checks-${{ github.run_id }}-${{ github.run_attempt }}.env
          retention-days: 14
          if-no-files-found: error

  # The dispatched child owns Telegram evidence/status artifacts; this blocking job
  # carries its exact conclusion into the parent summary without copying secrets or artifacts.
  qa_live_telegram_release_checks:
    name: Run QA Lab live Telegram lane
    needs: [resolve_target]
    if: contains(fromJSON('["all","qa","qa-live"]'), needs.resolve_target.outputs.rerun_group) && needs.resolve_target.outputs.qa_live_telegram_enabled == 'true'
    runs-on: ubuntu-24.04
    timeout-minutes: 210
    permissions:
      actions: write
      contents: read
    steps:
      - name: Dispatch and await trusted Telegram QA
        env:
          EXPECTED_TRUSTED_WORKFLOW_SHA: ${{ needs.resolve_target.outputs.trusted_workflow_sha }}
          GH_TOKEN: ${{ github.token }}
          TARGET_REF: ${{ needs.resolve_target.outputs.ref }}
          TARGET_SHA: ${{ needs.resolve_target.outputs.revision }}
        shell: bash
        run: |
          set -euo pipefail

          workflow="openclaw-release-telegram-qa.yml"
          dispatch_id="release-checks-${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}-$(openssl rand -hex 16)"
          run_name="OpenClaw Release Telegram QA ${dispatch_id}"
          current_main_sha="$(gh api "repos/${GITHUB_REPOSITORY}/commits/main" --jq .sha)"
          if [[ "$current_main_sha" != "$EXPECTED_TRUSTED_WORKFLOW_SHA" ]]; then
            echo "Trusted main moved to ${current_main_sha}, expected ${EXPECTED_TRUSTED_WORKFLOW_SHA}; refusing dispatch." >&2
            exit 1
          fi

          find_child_runs() {
            RUN_NAME="$run_name" gh api -X GET \
              "repos/${GITHUB_REPOSITORY}/actions/workflows/${workflow}/runs" \
              -F event=workflow_dispatch \
              -F branch=main \
              -F per_page=100 \
              --jq '[.workflow_runs[] | select(.display_title == env.RUN_NAME) | {id, head_sha}]'
          }
          run_id=""
          cancel_child_on_failure() {
            status="$?"
            trap - EXIT
            if [[ "$status" -ne 0 ]]; then
              set +e
              # The nonce makes delayed discovery safe after an ambiguous dispatch response.
              for _ in $(seq 1 6); do
                matches_json="$(find_child_runs 2>/dev/null)" || matches_json="[]"
                if [[ "$(jq 'length' <<<"$matches_json" 2>/dev/null)" == "1" ]]; then
                  run_id="$(jq -r '.[0].id' <<<"$matches_json")"
                  gh api -X POST "repos/${GITHUB_REPOSITORY}/actions/runs/${run_id}/cancel" >/dev/null 2>&1 || true
                  break
                fi
                sleep 2
              done
            fi
            exit "$status"
          }
          trap cancel_child_on_failure EXIT
          trap 'exit 130' INT
          trap 'exit 143' TERM

          gh workflow run "$workflow" \
            --repo "$GITHUB_REPOSITORY" \
            --ref main \
            -f dispatch_id="$dispatch_id" \
            -f expected_trusted_workflow_sha="$EXPECTED_TRUSTED_WORKFLOW_SHA" \
            -f target_ref="$TARGET_REF" \
            -f target_sha="$TARGET_SHA"

          for _ in $(seq 1 60); do
            matches_json="$(find_child_runs)"
            match_count="$(jq 'length' <<<"$matches_json")"
            if ((match_count > 1)); then
              echo "Multiple Telegram QA runs matched ${run_name}; refusing to guess." >&2
              exit 1
            fi
            if ((match_count == 1)); then
              run_id="$(jq -r '.[0].id' <<<"$matches_json")"
              child_head_sha="$(jq -r '.[0].head_sha' <<<"$matches_json")"
              [[ "$child_head_sha" == "$EXPECTED_TRUSTED_WORKFLOW_SHA" ]]
              break
            fi
            sleep 5
          done
          if [[ -z "$run_id" ]]; then
            echo "Could not find exact dispatched Telegram QA run ${run_name}." >&2
            exit 1
          fi

          child_url="https://github.com/${GITHUB_REPOSITORY}/actions/runs/${run_id}"
          echo "Dispatched trusted Telegram QA: ${child_url}"
          for _ in $(seq 1 1080); do
            run_json="$(gh api "repos/${GITHUB_REPOSITORY}/actions/runs/${run_id}")"
            status="$(jq -r .status <<<"$run_json")"
            if [[ "$status" == "completed" ]]; then
              conclusion="$(jq -r .conclusion <<<"$run_json")"
              if [[ "$conclusion" != "success" ]]; then
                echo "Trusted Telegram QA concluded ${conclusion}: ${child_url}" >&2
                exit 1
              fi
              exit 0
            fi
            sleep 10
          done
          echo "Timed out awaiting trusted Telegram QA: ${child_url}" >&2
          exit 1

  qa_live_discord_release_checks:
    name: Run QA Lab live Discord lane
    needs: [resolve_target]
    if: contains(fromJSON('["all","qa","qa-live"]'), needs.resolve_target.outputs.rerun_group) && needs.resolve_target.outputs.qa_live_discord_enabled == 'true'
    continue-on-error: true
    runs-on: ubuntu-24.04
