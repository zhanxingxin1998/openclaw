name: OpenClaw Release Checks

run-name: ${{ inputs.dispatch_id != '' && format('OpenClaw Release Checks {0}', inputs.dispatch_id) || 'OpenClaw Release Checks' }}

on:
  workflow_dispatch:
    inputs:
      ref:
        description: Branch, tag, or full commit SHA to validate
        required: true
        type: string
      expected_sha:
        description: Optional full SHA that ref must resolve to
        required: false
        default: ""
        type: string
      provider:
        description: Provider lane for cross-OS onboarding and the end-to-end agent turn
        required: false
        default: openai
        type: choice
        options:
          - openai
          - anthropic
          - minimax
      mode:
        description: Which cross-OS release lanes to run
        required: false
        default: both
        type: choice
        options:
          - fresh
          - upgrade
          - both
      release_profile:
        description: Release coverage profile for live/Docker/provider breadth
        required: false
        default: stable
        type: choice
        options:
          - beta
          - stable
          - full
      run_release_soak:
        description: Run exhaustive live/Docker and upgrade-survivor soak lanes; forced on for release_profile=stable and full
        required: false
        default: false
        type: boolean
      run_maturity_scorecard:
        description: Render advisory maturity scorecard release docs; default release checks rely on dedicated package, QA, live, and E2E gates
        required: false
        default: false
        type: boolean
      rerun_group:
        description: Release check group to run
        required: false
        default: all
        type: choice
        options:
          - all
          - install-smoke
          - cross-os
          - live-e2e
          - package
          - qa
          - qa-parity
          - qa-live
      live_suite_filter:
        description: Optional exact live/E2E suite id, or comma-separated QA live lanes such as qa-live-matrix,qa-live-telegram,qa-live-discord,qa-live-whatsapp; blank runs all selected live suites
        required: false
        default: ""
        type: string
      cross_os_suite_filter:
        description: Optional focused cross-OS suite filter, e.g. windows/packaged-upgrade or packaged-fresh
        required: false
        default: ""
        type: string
      release_package_spec:
        description: Optional published package spec for release checks; blank builds the selected SHA package artifact
        required: false
        default: ""
        type: string
      package_acceptance_package_spec:
        description: Optional published package spec for Package Acceptance; blank uses the prepared release artifact
        required: false
        default: ""
        type: string
      codex_plugin_spec:
        description: Optional Codex plugin install spec for live Docker package checks; blank derives from release_package_spec or packs the selected ref
        required: false
        default: ""
        type: string
      dispatch_id:
        description: Optional parent workflow dispatch identifier
        required: false
        default: ""
        type: string

concurrency:
  group: openclaw-release-checks-${{ inputs.expected_sha || inputs.ref }}-${{ inputs.rerun_group }}
  cancel-in-progress: ${{ startsWith(github.ref, 'refs/heads/tideclaw/alpha/') }}

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
  NODE_VERSION: "24.15.0"
  OPENCLAW_CI_OPENAI_MODEL: ${{ vars.OPENCLAW_CI_OPENAI_MODEL || 'openai/gpt-5.5' }}

jobs:
  resolve_target:
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    permissions:
      contents: read
    outputs:
      ref: ${{ steps.inputs.outputs.ref }}
      revision: ${{ steps.ref.outputs.sha }}
      provider: ${{ steps.inputs.outputs.provider }}
      mode: ${{ steps.inputs.outputs.mode }}
      release_profile: ${{ steps.inputs.outputs.release_profile }}
      run_release_soak: ${{ steps.inputs.outputs.run_release_soak }}
      run_maturity_scorecard: ${{ steps.inputs.outputs.run_maturity_scorecard }}
      rerun_group: ${{ steps.inputs.outputs.rerun_group }}
      live_suite_filter: ${{ steps.inputs.outputs.live_suite_filter }}
      cross_os_suite_filter: ${{ steps.inputs.outputs.cross_os_suite_filter }}
      qa_live_matrix_enabled: ${{ steps.inputs.outputs.qa_live_matrix_enabled }}
      qa_live_telegram_enabled: ${{ steps.inputs.outputs.qa_live_telegram_enabled }}
      qa_live_discord_enabled: ${{ steps.inputs.outputs.qa_live_discord_enabled }}
      qa_live_whatsapp_enabled: ${{ steps.inputs.outputs.qa_live_whatsapp_enabled }}
      qa_live_slack_enabled: ${{ steps.inputs.outputs.qa_live_slack_enabled }}
      release_package_spec: ${{ steps.inputs.outputs.release_package_spec }}
      package_acceptance_package_spec: ${{ steps.inputs.outputs.package_acceptance_package_spec }}
      codex_plugin_spec: ${{ steps.inputs.outputs.codex_plugin_spec }}
      trusted_workflow_sha: ${{ steps.trusted_workflow.outputs.sha }}
    steps:
      - name: Require trusted workflow ref for release checks
        env:
          RELEASE_REF: ${{ inputs.ref }}
          WORKFLOW_REF: ${{ github.ref }}
        run: |
          set -euo pipefail
          tideclaw_alpha_check=false
          if [[ "${WORKFLOW_REF}" =~ ^refs/heads/tideclaw/alpha/[0-9]{4}-[0-9]{2}-[0-9]{2}-[0-9]{4}Z$ ]]; then
            workflow_branch="${WORKFLOW_REF#refs/heads/}"
            if [[ "${RELEASE_REF}" == *"-alpha."* || "${RELEASE_REF}" =~ ^[0-9a-fA-F]{40}$ || "${RELEASE_REF}" == "${workflow_branch}" || "${RELEASE_REF}" == "refs/heads/${workflow_branch}" ]]; then
              tideclaw_alpha_check=true
            fi
          fi
          if [[ "${WORKFLOW_REF}" != "refs/heads/main" ]] && [[ ! "${WORKFLOW_REF}" =~ ^refs/heads/release/[0-9]{4}\.[1-9][0-9]*\.[1-9][0-9]*$ ]] && [[ ! "${WORKFLOW_REF}" =~ ^refs/heads/release-ci/[0-9a-f]{12}-[0-9]+$ ]] && [[ ! "${WORKFLOW_REF}" =~ ^refs/heads/extended-stable/[0-9]{4}\.([1-9]|1[0-2])\.33$ ]] && [[ "${tideclaw_alpha_check}" != "true" ]]; then
            echo "Release checks must be dispatched from main, release/YYYY.M.PATCH, extended-stable/YYYY.M.33, a Full Release Validation release-ci/<sha>-<timestamp> ref, or a Tideclaw alpha branch for alpha prereleases." >&2
            exit 1
          fi

      - name: Validate ref input
        env:
          RELEASE_REF: ${{ inputs.ref }}
          EXPECTED_SHA: ${{ inputs.expected_sha }}
        run: |
          set -euo pipefail
          if [[ -z "${RELEASE_REF// }" ]] || [[ "${RELEASE_REF}" == -* ]]; then
            echo "Expected a branch, tag, or full commit SHA; got: ${RELEASE_REF}" >&2
            exit 1
          fi
          if [[ -n "${EXPECTED_SHA// }" ]] && [[ ! "${EXPECTED_SHA}" =~ ^[0-9a-fA-F]{40}$ ]]; then
            echo "Expected expected_sha to be a full commit SHA; got: ${EXPECTED_SHA}" >&2
            exit 1
          fi

      - name: Checkout trusted workflow helper
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          persist-credentials: false
          ref: ${{ github.sha }}
          path: workflow
          fetch-depth: 1

      - name: Resolve trusted main Telegram workflow SHA
        id: trusted_workflow
        run: |
          bash workflow/scripts/github/resolve-openclaw-ref.sh \
            --ref refs/heads/main \
            --github-output "$GITHUB_OUTPUT"

      - name: Fast-resolve selected ref
        id: fast_ref
        env:
          RELEASE_REF: ${{ inputs.ref }}
          EXPECTED_SHA: ${{ inputs.expected_sha }}
        run: |
          bash workflow/scripts/github/resolve-openclaw-ref.sh \
            --ref "$RELEASE_REF" \
            --expected-sha "$EXPECTED_SHA" \
            --fallback-ok \
            --github-output "$GITHUB_OUTPUT"

      - name: Checkout selected ref for reachability fallback
        if: steps.fast_ref.outputs.fallback == 'true'
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          persist-credentials: false
          ref: ${{ inputs.ref }}
          path: source
          fetch-depth: 0

      - name: Resolve checked-out fallback SHA
        if: steps.fast_ref.outputs.fallback == 'true'
        id: fallback_ref
        working-directory: source
        run: echo "sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"

      - name: Validate selected ref belongs to this repository
        if: steps.fast_ref.outputs.fallback == 'true'
        working-directory: source
        env:
          RELEASE_REF: ${{ inputs.ref }}
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          SELECTED_SHA="$(git rev-parse HEAD)"
          git_fetch_with_checkout_auth() {
            if git config --get-all http.https://github.com/.extraheader >/dev/null; then
              git fetch "$@"
              return
            fi
            local auth_header
            auth_header="$(printf 'x-access-token:%s' "$GITHUB_TOKEN" | base64 | tr -d '\n')"
            git -c "http.https://github.com/.extraheader=AUTHORIZATION: basic ${auth_header}" fetch "$@"
          }
          git_fetch_with_checkout_auth --no-tags origin '+refs/heads/*:refs/remotes/origin/*'
          git_fetch_with_checkout_auth --tags origin '+refs/tags/*:refs/tags/*'

          if git tag --points-at "${SELECTED_SHA}" | grep -Eq '^v'; then
            exit 0
          fi

          if git for-each-ref --format='%(refname:short)' --contains "${SELECTED_SHA}" refs/remotes/origin | grep -Eq '^origin/'; then
            exit 0
          fi

          echo "Ref '${RELEASE_REF}' resolved to ${SELECTED_SHA}, but that commit is not reachable from an OpenClaw branch or release tag." >&2
          echo "Secret-bearing release checks only run repository-owned branch/tag history, not arbitrary unreferenced commits." >&2
          exit 1

      - name: Finalize resolved SHA
        id: ref
        env:
          FAST_SHA: ${{ steps.fast_ref.outputs.sha }}
          FALLBACK_SHA: ${{ steps.fallback_ref.outputs.sha }}
          EXPECTED_SHA: ${{ inputs.expected_sha }}
          USED_FALLBACK: ${{ steps.fast_ref.outputs.fallback }}
        run: |
          set -euo pipefail
          selected_sha="$FAST_SHA"
          if [[ "$USED_FALLBACK" == "true" ]]; then
            selected_sha="$FALLBACK_SHA"
          fi
          if [[ -z "$selected_sha" ]]; then
            echo "Failed to resolve selected ref SHA." >&2
            exit 1
          fi
          if [[ -n "${EXPECTED_SHA// }" ]] && [[ "${selected_sha,,}" != "${EXPECTED_SHA,,}" ]]; then
            echo "Ref resolved to ${selected_sha}, expected ${EXPECTED_SHA}." >&2
            exit 1
          fi
          echo "sha=${selected_sha,,}" >> "$GITHUB_OUTPUT"

      - name: Validate Tideclaw alpha target matches workflow branch
        if: startsWith(github.ref, 'refs/heads/tideclaw/alpha/')
        working-directory: workflow
        env:
          SELECTED_SHA: ${{ steps.ref.outputs.sha }}
          WORKFLOW_REF: ${{ github.ref }}
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          if [[ ! "${WORKFLOW_REF}" =~ ^refs/heads/tideclaw/alpha/[0-9]{4}-[0-9]{2}-[0-9]{2}-[0-9]{4}Z$ ]]; then
            echo "Tideclaw alpha release checks must run from tideclaw/alpha/YYYY-MM-DD-HHMMZ." >&2
            exit 1
          fi
          alpha_branch="${WORKFLOW_REF#refs/heads/}"
          git_fetch_with_checkout_auth() {
            if git config --get-all http.https://github.com/.extraheader >/dev/null; then
              git fetch "$@"
              return
            fi
            local auth_header
            auth_header="$(printf 'x-access-token:%s' "$GITHUB_TOKEN" | base64 | tr -d '\n')"
            git -c "http.https://github.com/.extraheader=AUTHORIZATION: basic ${auth_header}" fetch "$@"
          }
          git_fetch_with_checkout_auth --no-tags origin "+refs/heads/${alpha_branch}:refs/remotes/origin/${alpha_branch}"
          if ! git merge-base --is-ancestor "${SELECTED_SHA}" "refs/remotes/origin/${alpha_branch}"; then
            echo "Alpha release target ${SELECTED_SHA} must be reachable from ${alpha_branch}." >&2
            exit 1
          fi

      - name: Capture selected inputs
        id: inputs
        env:
          RELEASE_REF_INPUT: ${{ inputs.ref }}
          RELEASE_PROVIDER_INPUT: ${{ inputs.provider }}
          RELEASE_MODE_INPUT: ${{ inputs.mode }}
          RELEASE_PROFILE_INPUT: ${{ inputs.release_profile }}
          RELEASE_RUN_RELEASE_SOAK_INPUT: ${{ inputs.run_release_soak }}
          RELEASE_RUN_MATURITY_SCORECARD_INPUT: ${{ inputs.run_maturity_scorecard }}
          RELEASE_RERUN_GROUP_INPUT: ${{ inputs.rerun_group }}
          RELEASE_LIVE_SUITE_FILTER_INPUT: ${{ inputs.live_suite_filter }}
          RELEASE_CROSS_OS_SUITE_FILTER_INPUT: ${{ inputs.cross_os_suite_filter }}
          RELEASE_QA_DISCORD_LIVE_CI_ENABLED: ${{ vars.OPENCLAW_RELEASE_QA_DISCORD_LIVE_CI_ENABLED || 'false' }}
          RELEASE_QA_WHATSAPP_LIVE_CI_ENABLED: ${{ vars.OPENCLAW_RELEASE_QA_WHATSAPP_LIVE_CI_ENABLED || 'false' }}
          RELEASE_QA_SLACK_LIVE_CI_ENABLED: ${{ vars.OPENCLAW_RELEASE_QA_SLACK_LIVE_CI_ENABLED || 'false' }}
          RELEASE_PACKAGE_SPEC_INPUT: ${{ inputs.release_package_spec }}
          RELEASE_PACKAGE_ACCEPTANCE_PACKAGE_SPEC_INPUT: ${{ inputs.package_acceptance_package_spec }}
          RELEASE_CODEX_PLUGIN_SPEC_INPUT: ${{ inputs.codex_plugin_spec }}
        run: |
          set -euo pipefail
          qa_live_matrix_enabled=true
          qa_live_telegram_enabled=true
          qa_live_discord_ci_enabled="$(printf '%s' "$RELEASE_QA_DISCORD_LIVE_CI_ENABLED" | tr '[:upper:]' '[:lower:]')"
          if [[ "$qa_live_discord_ci_enabled" != "true" && "$qa_live_discord_ci_enabled" != "1" && "$qa_live_discord_ci_enabled" != "yes" ]]; then
            qa_live_discord_ci_enabled=false
          else
            qa_live_discord_ci_enabled=true
          fi
          qa_live_whatsapp_ci_enabled="$(printf '%s' "$RELEASE_QA_WHATSAPP_LIVE_CI_ENABLED" | tr '[:upper:]' '[:lower:]')"
          if [[ "$qa_live_whatsapp_ci_enabled" != "true" && "$qa_live_whatsapp_ci_enabled" != "1" && "$qa_live_whatsapp_ci_enabled" != "yes" ]]; then
            qa_live_whatsapp_ci_enabled=false
          else
            qa_live_whatsapp_ci_enabled=true
          fi
          qa_live_slack_ci_enabled="$(printf '%s' "$RELEASE_QA_SLACK_LIVE_CI_ENABLED" | tr '[:upper:]' '[:lower:]')"
          if [[ "$qa_live_slack_ci_enabled" != "true" && "$qa_live_slack_ci_enabled" != "1" && "$qa_live_slack_ci_enabled" != "yes" ]]; then
            qa_live_slack_ci_enabled=false
          else
            qa_live_slack_ci_enabled=true
          fi
          qa_live_discord_enabled="$qa_live_discord_ci_enabled"
          qa_live_whatsapp_enabled="$qa_live_whatsapp_ci_enabled"
          qa_live_slack_enabled="$qa_live_slack_ci_enabled"
          run_release_soak="$(printf '%s' "$RELEASE_RUN_RELEASE_SOAK_INPUT" | tr '[:upper:]' '[:lower:]')"
          if [[ "$run_release_soak" != "true" && "$run_release_soak" != "1" && "$run_release_soak" != "yes" ]]; then
            run_release_soak=false
          else
            run_release_soak=true
          fi
          run_maturity_scorecard="$(printf '%s' "$RELEASE_RUN_MATURITY_SCORECARD_INPUT" | tr '[:upper:]' '[:lower:]')"
          if [[ "$run_maturity_scorecard" != "true" && "$run_maturity_scorecard" != "1" && "$run_maturity_scorecard" != "yes" ]]; then
            run_maturity_scorecard=false
          else
            run_maturity_scorecard=true
          fi
          release_profile="$RELEASE_PROFILE_INPUT"
          if [[ "$release_profile" == "minimum" ]]; then
            release_profile=beta
          fi
          case "$release_profile" in
            beta|stable|full) ;;
            *)
              echo "release_profile must be one of: beta, stable, full" >&2
              exit 1
              ;;
          esac
          if [[ "$release_profile" == "stable" || "$release_profile" == "full" ]]; then
            run_release_soak=true
          fi
          codex_plugin_spec="$RELEASE_CODEX_PLUGIN_SPEC_INPUT"
          if [[ -z "${codex_plugin_spec// }" && "$RELEASE_PACKAGE_SPEC_INPUT" =~ ^openclaw@(.+)$ ]]; then
            codex_plugin_spec="npm:@openclaw/codex@${BASH_REMATCH[1]}"
          fi

          filter="$(printf '%s' "$RELEASE_LIVE_SUITE_FILTER_INPUT" | tr '[:upper:]' '[:lower:]')"
          if [[ -n "${filter// }" ]]; then
            qa_filter_seen=false
            matrix_selected=false
            telegram_selected=false
            discord_selected=false
            whatsapp_selected=false
            slack_selected=false
            disabled_required_lanes=()

            IFS=', ' read -r -a filter_tokens <<< "$filter"
            for token in "${filter_tokens[@]}"; do
              token="${token//$'\t'/}"
              token="${token//$'\r'/}"
              token="${token//$'\n'/}"
              [[ -z "$token" ]] && continue
              case "$token" in
                qa-live|qa-live-all|qa-all)
                  qa_filter_seen=true
                  matrix_selected=true
                  telegram_selected=true
                  discord_selected="$qa_live_discord_ci_enabled"
                  whatsapp_selected="$qa_live_whatsapp_ci_enabled"
                  slack_selected="$qa_live_slack_ci_enabled"
                  [[ "$qa_live_discord_ci_enabled" == "true" ]] || disabled_required_lanes+=("qa-live-discord")
                  [[ "$qa_live_whatsapp_ci_enabled" == "true" ]] || disabled_required_lanes+=("qa-live-whatsapp")
                  [[ "$qa_live_slack_ci_enabled" == "true" ]] || disabled_required_lanes+=("qa-live-slack")
                  ;;
                qa-live-non-slack|qa-non-slack|non-slack|no-slack|without-slack)
                  qa_filter_seen=true
                  matrix_selected=true
                  telegram_selected=true
                  discord_selected="$qa_live_discord_ci_enabled"
                  whatsapp_selected="$qa_live_whatsapp_ci_enabled"
                  [[ "$qa_live_discord_ci_enabled" == "true" ]] || disabled_required_lanes+=("qa-live-discord")
                  [[ "$qa_live_whatsapp_ci_enabled" == "true" ]] || disabled_required_lanes+=("qa-live-whatsapp")
                  ;;
                qa-live-matrix|qa-matrix|matrix)
                  qa_filter_seen=true
                  matrix_selected=true
                  ;;
                qa-live-telegram|qa-telegram|telegram)
                  qa_filter_seen=true
                  telegram_selected=true
                  ;;
                qa-live-discord|qa-discord|discord)
                  qa_filter_seen=true
                  discord_selected="$qa_live_discord_ci_enabled"
                  [[ "$qa_live_discord_ci_enabled" == "true" ]] || disabled_required_lanes+=("qa-live-discord")
                  ;;
                qa-live-whatsapp|qa-whatsapp|whatsapp)
                  qa_filter_seen=true
                  whatsapp_selected="$qa_live_whatsapp_ci_enabled"
                  [[ "$qa_live_whatsapp_ci_enabled" == "true" ]] || disabled_required_lanes+=("qa-live-whatsapp")
                  ;;
                qa-live-slack|qa-slack|slack)
                  qa_filter_seen=true
                  slack_selected="$qa_live_slack_ci_enabled"
                  [[ "$qa_live_slack_ci_enabled" == "true" ]] || disabled_required_lanes+=("qa-live-slack")
                  ;;
              esac
            done

            if [[ "${#disabled_required_lanes[@]}" -gt 0 ]]; then
              echo "live_suite_filter explicitly requested disabled QA live lane(s): ${disabled_required_lanes[*]}" >&2
              echo "Enable the matching OPENCLAW_RELEASE_QA_*_LIVE_CI_ENABLED repo variable or remove the lane from live_suite_filter." >&2
              exit 1
            fi

            if [[ "$qa_filter_seen" == "true" ]]; then
              qa_live_matrix_enabled="$matrix_selected"
              qa_live_telegram_enabled="$telegram_selected"
              qa_live_discord_enabled="$discord_selected"
              qa_live_whatsapp_enabled="$whatsapp_selected"
              qa_live_slack_enabled="$slack_selected"
            fi
          fi

          {
            printf 'ref=%s\n' "$RELEASE_REF_INPUT"
            printf 'provider=%s\n' "$RELEASE_PROVIDER_INPUT"
            printf 'mode=%s\n' "$RELEASE_MODE_INPUT"
            printf 'release_profile=%s\n' "$release_profile"
            printf 'run_release_soak=%s\n' "$run_release_soak"
            printf 'run_maturity_scorecard=%s\n' "$run_maturity_scorecard"
            printf 'rerun_group=%s\n' "$RELEASE_RERUN_GROUP_INPUT"
            printf 'live_suite_filter=%s\n' "$RELEASE_LIVE_SUITE_FILTER_INPUT"
            printf 'cross_os_suite_filter=%s\n' "$RELEASE_CROSS_OS_SUITE_FILTER_INPUT"
            printf 'qa_live_matrix_enabled=%s\n' "$qa_live_matrix_enabled"
            printf 'qa_live_telegram_enabled=%s\n' "$qa_live_telegram_enabled"
            printf 'qa_live_discord_enabled=%s\n' "$qa_live_discord_enabled"
            printf 'qa_live_whatsapp_enabled=%s\n' "$qa_live_whatsapp_enabled"
            printf 'qa_live_slack_enabled=%s\n' "$qa_live_slack_enabled"
            printf 'release_package_spec=%s\n' "$RELEASE_PACKAGE_SPEC_INPUT"
            printf 'package_acceptance_package_spec=%s\n' "$RELEASE_PACKAGE_ACCEPTANCE_PACKAGE_SPEC_INPUT"
            printf 'codex_plugin_spec=%s\n' "$codex_plugin_spec"
          } >> "$GITHUB_OUTPUT"

      - name: Summarize validated ref
        env:
          RELEASE_REF: ${{ inputs.ref }}
          RELEASE_SHA: ${{ steps.ref.outputs.sha }}
          RELEASE_REF_FAST_PATH: ${{ steps.fast_ref.outputs.fast }}
          RELEASE_PROVIDER: ${{ inputs.provider }}
          RELEASE_MODE: ${{ inputs.mode }}
          RELEASE_PROFILE: ${{ steps.inputs.outputs.release_profile }}
          RUN_RELEASE_SOAK: ${{ steps.inputs.outputs.run_release_soak }}
          RUN_MATURITY_SCORECARD: ${{ steps.inputs.outputs.run_maturity_scorecard }}
          RELEASE_RERUN_GROUP: ${{ inputs.rerun_group }}
          RELEASE_LIVE_SUITE_FILTER: ${{ inputs.live_suite_filter }}
          RELEASE_CROSS_OS_SUITE_FILTER: ${{ inputs.cross_os_suite_filter }}
          RELEASE_PACKAGE_SPEC: ${{ inputs.release_package_spec }}
          PACKAGE_ACCEPTANCE_PACKAGE_SPEC: ${{ inputs.package_acceptance_package_spec }}
          CODEX_PLUGIN_SPEC: ${{ steps.inputs.outputs.codex_plugin_spec }}
        run: |
          {
            echo "## Release checks"
            echo
            echo "- Requested ref: \`${RELEASE_REF}\`"
            echo "- Validated SHA: \`${RELEASE_SHA}\`"
            echo "- Ref resolution fast path: \`${RELEASE_REF_FAST_PATH}\`"
            echo "- Cross-OS provider: \`${RELEASE_PROVIDER}\`"
            echo "- Cross-OS mode: \`${RELEASE_MODE}\`"
            echo "- Release profile: \`${RELEASE_PROFILE}\`"
            echo "- Release soak lanes: \`${RUN_RELEASE_SOAK}\`"
            echo "- Maturity scorecard docs: \`${RUN_MATURITY_SCORECARD}\`"
            echo "- Rerun group: \`${RELEASE_RERUN_GROUP}\`"
            if [[ -n "${RELEASE_LIVE_SUITE_FILTER// }" ]]; then
              echo "- Live suite filter: \`${RELEASE_LIVE_SUITE_FILTER}\`"
            fi
            if [[ -n "${RELEASE_CROSS_OS_SUITE_FILTER// }" ]]; then
              echo "- Cross-OS suite filter: \`${RELEASE_CROSS_OS_SUITE_FILTER}\`"
            fi
            echo "- QA live lanes: Matrix \`${{ steps.inputs.outputs.qa_live_matrix_enabled }}\`, Telegram \`${{ steps.inputs.outputs.qa_live_telegram_enabled }}\`, Discord \`${{ steps.inputs.outputs.qa_live_discord_enabled }}\`, WhatsApp \`${{ steps.inputs.outputs.qa_live_whatsapp_enabled }}\`, Slack \`${{ steps.inputs.outputs.qa_live_slack_enabled }}\`"
            if [[ -n "${RELEASE_PACKAGE_SPEC// }" ]]; then
              echo "- Release package spec: \`${RELEASE_PACKAGE_SPEC}\`"
            fi
            if [[ -n "${PACKAGE_ACCEPTANCE_PACKAGE_SPEC// }" ]]; then
              echo "- Package Acceptance package spec: \`${PACKAGE_ACCEPTANCE_PACKAGE_SPEC}\`"
            elif [[ -n "${RELEASE_PACKAGE_SPEC// }" ]]; then
              echo "- Package Acceptance package spec: \`${RELEASE_PACKAGE_SPEC}\`"
            else
              echo "- Package Acceptance package spec: prepared release artifact"
            fi
            if [[ -n "${CODEX_PLUGIN_SPEC// }" ]]; then
              echo "- Codex plugin spec: \`${CODEX_PLUGIN_SPEC}\`"
            else
              echo "- Codex plugin spec: packed from selected ref"
            fi
            if [[ "$RUN_RELEASE_SOAK" == "true" ]]; then
              echo "- This run will execute blocking release validation plus exhaustive live/Docker soak coverage."
            else
              echo "- This run will execute blocking release validation. Exhaustive live/Docker soak lanes are skipped unless \`run_release_soak=true\`, \`release_profile=full\`, or \`rerun_group=live-e2e\` is selected."
            fi
          } >> "$GITHUB_STEP_SUMMARY"

  prepare_release_package:
    name: Prepare release package artifact
    needs: [resolve_target]
    if: contains(fromJSON('["all","cross-os","package"]'), needs.resolve_target.outputs.rerun_group) || (needs.resolve_target.outputs.rerun_group == 'live-e2e' && needs.resolve_target.outputs.live_suite_filter == '')
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    permissions:
      contents: read
      packages: read
    outputs:
      artifact_digest: ${{ steps.release_package_upload.outputs.artifact-digest }}
      artifact_id: ${{ steps.release_package_upload.outputs.artifact-id }}
      artifact_name: ${{ steps.artifact.outputs.name }}
      artifact_run_attempt: ${{ steps.artifact.outputs.run_attempt }}
      artifact_run_id: ${{ steps.artifact.outputs.run_id }}
      package_file_name: ${{ steps.artifact.outputs.file_name }}
      package_sha256: ${{ steps.package.outputs.sha256 }}
      package_version: ${{ steps.package.outputs.package_version }}
      source_sha: ${{ steps.package.outputs.source_sha }}
    steps:
      - name: Checkout trusted workflow ref
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          persist-credentials: false
          ref: ${{ github.sha }}
          fetch-depth: 0

      - name: Set artifact metadata
        id: artifact
        run: |
          {
            echo "file_name=openclaw-current.tgz"
            echo "name=release-package-under-test-${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}"
            echo "run_attempt=${GITHUB_RUN_ATTEMPT}"
            echo "run_id=${GITHUB_RUN_ID}"
          } >> "$GITHUB_OUTPUT"

      - name: Setup Node environment
        uses: ./.github/actions/setup-node-env
        with:
          node-version: ${{ env.NODE_VERSION }}
          install-bun: "true"
          install-deps: "true"

      - name: Resolve release package artifact
        id: package
        shell: bash
        env:
          PACKAGE_REF: ${{ needs.resolve_target.outputs.revision }}
          RELEASE_PACKAGE_SPEC: ${{ needs.resolve_target.outputs.release_package_spec }}
        run: |
          set -euo pipefail
          source_args=(--source ref --package-ref "$PACKAGE_REF")
          package_label="ref:${PACKAGE_REF}"
          if [[ -n "${RELEASE_PACKAGE_SPEC// }" ]]; then
            source_args=(--source npm --package-spec "$RELEASE_PACKAGE_SPEC")
            package_label="$RELEASE_PACKAGE_SPEC"
          fi
          node scripts/resolve-openclaw-package-candidate.mjs \
            "${source_args[@]}" \
            --output-dir .artifacts/docker-e2e-package \
            --output-name openclaw-current.tgz \
            --metadata .artifacts/docker-e2e-package/package-candidate.json \
            --github-output "$GITHUB_OUTPUT"
          digest="$(node -p "JSON.parse(require('fs').readFileSync('.artifacts/docker-e2e-package/package-candidate.json', 'utf8')).sha256")"
          version="$(node -p "JSON.parse(require('fs').readFileSync('.artifacts/docker-e2e-package/package-candidate.json', 'utf8')).version")"
          source_sha="$(node -p "JSON.parse(require('fs').readFileSync('.artifacts/docker-e2e-package/package-candidate.json', 'utf8')).packageSourceSha")"
          if [[ "$source_sha" != "$PACKAGE_REF" ]]; then
            echo "Release package source SHA differs from the selected release SHA: expected $PACKAGE_REF, found ${source_sha:-<missing>}." >&2
            exit 1
          fi
          echo "source_sha=$source_sha" >> "$GITHUB_OUTPUT"
          {
            echo "## Release package artifact"
            echo
            echo "- Artifact: \`${{ steps.artifact.outputs.name }}\`"
            echo "- Package: \`$package_label\`"
            echo "- SHA-256: \`$digest\`"
            echo "- Version: \`$version\`"
            echo "- Source SHA: \`$source_sha\`"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload release package artifact
        id: release_package_upload
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: ${{ steps.artifact.outputs.name }}
          path: |
            .artifacts/docker-e2e-package/${{ steps.artifact.outputs.file_name }}
            .artifacts/docker-e2e-package/package-candidate.json
          retention-days: 14
          if-no-files-found: error

      - name: Validate release package artifact binding
        env:
          ARTIFACT_DIGEST: ${{ steps.release_package_upload.outputs.artifact-digest }}
          ARTIFACT_ID: ${{ steps.release_package_upload.outputs.artifact-id }}
          ARTIFACT_NAME: ${{ steps.artifact.outputs.name }}
          ARTIFACT_RUN_ATTEMPT: ${{ steps.artifact.outputs.run_attempt }}
          ARTIFACT_RUN_ID: ${{ steps.artifact.outputs.run_id }}
          PACKAGE_FILE_NAME: ${{ steps.artifact.outputs.file_name }}
          PACKAGE_SHA256: ${{ steps.package.outputs.sha256 }}
          PACKAGE_SOURCE_SHA: ${{ steps.package.outputs.source_sha }}
          PACKAGE_VERSION: ${{ steps.package.outputs.package_version }}
        run: |
          set -euo pipefail
          [[ "$ARTIFACT_ID" =~ ^[1-9][0-9]*$ ]] || {
            echo "Release package artifact ID is missing or invalid." >&2
            exit 1
          }
          [[ "$ARTIFACT_DIGEST" =~ ^[a-f0-9]{64}$ ]] || {
            echo "Release package artifact digest is missing or invalid." >&2
            exit 1
          }
          [[ "$ARTIFACT_RUN_ID" == "$GITHUB_RUN_ID" &&
            "$ARTIFACT_RUN_ATTEMPT" == "$GITHUB_RUN_ATTEMPT" ]] || {
            echo "Release package artifact run binding is invalid." >&2
            exit 1
          }
          [[ "$ARTIFACT_NAME" == "release-package-under-test-${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}" &&
            "$PACKAGE_FILE_NAME" == "openclaw-current.tgz" ]] || {
            echo "Release package artifact name or tarball filename is invalid." >&2
            exit 1
          }
          [[ "$PACKAGE_SHA256" =~ ^[a-f0-9]{64}$ &&
            "$PACKAGE_SOURCE_SHA" =~ ^[a-f0-9]{40}$ &&
            -n "${PACKAGE_VERSION// }" ]] || {
            echo "Release package identity is incomplete." >&2
            exit 1
          }

